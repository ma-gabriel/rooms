services:
  #----------------------------------------------------------------------------#
  #                                 CLIENT                                     #
  #----------------------------------------------------------------------------#
  client:
    container_name: client
    image: client
    build:
      context: services/client/
    volumes:
      - client_volume:/var/npm-project
      - node_modules_client:/var/npm-project/node_modules
      - www:/var/www
    restart: "always"
  
  #----------------------------------------------------------------------------#
  #                                  SERVER                                    #
  #----------------------------------------------------------------------------#
  server:
    container_name: server
    image: server
    build:
      context: services/server/
    volumes:
      - server_volume:/var/npm-project
      - node_modules_server:/var/npm-project/node_modules
      - www:/var/www
    networks:
      - rooms
    environment:
      DATABASE_URL: postgresql://rooms_user:rooms_password@postgres_db:5432/rooms_db
    restart: "always"

  #----------------------------------------------------------------------------#
  #                                   NGINX                                    #
  #----------------------------------------------------------------------------#
  nginx:
    container_name: nginx
    image: nginx
    build:
      context: services/nginx/
    ports:
      - 8080:80
    networks:
      - rooms
    restart: "always"

  #----------------------------------------------------------------------------#
  #                                   DB                                       #
  #----------------------------------------------------------------------------#

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rooms_user
      POSTGRES_PASSWORD: rooms_password
      POSTGRES_DB: rooms_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rooms
  

  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:latest
    container_name: imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: "0.0.0.0:8080"
      IMGPROXY_KEY: ""
      IMGPROXY_SALT: ""

      # Security
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_MAX_SRC_FILE_SIZE: "10485760"
      IMGPROXY_TIMEOUT: "5"
      IMGPROXY_ALLOWED_PROTOCOLS: "https"
    networks:
      - rooms
    expose:
      - "8080"

  #----------------------------------------------------------------------------#
  #                                    VOLUMES                                 #
  #----------------------------------------------------------------------------#

volumes:
  client_volume:
    name: client_volume
    driver: local
    driver_opts:
      device: ./services/client/npm-project
      o: bind
      type: none
  server_volume:
    name: server_volume
    driver: local
    driver_opts:
      device: ./services/server/npm-project
      o: bind
      type: none
  postgres_data:
  www:
    name: www
    driver: local
    driver_opts:
      device: ./built_data/www
      o: bind
      type: none
  node_modules_client:
  node_modules_server:

networks:
  rooms:
    name: rooms
    driver: bridge
